version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/healthcare
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/healthcare
      - REDIS_URL=redis://:redis@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:redis@redis:6379/2
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - venv_data:/app/.venv
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare_celery
    command: celery -A app.workers.celery_app worker --loglevel=info -Q ocr,notifications,default -c 4
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/healthcare
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/healthcare
      - REDIS_URL=redis://:redis@redis:6379/0
      - CELERY_BROKER_URL=redis://:redis@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:redis@redis:6379/2
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
      - venv_data:/app/.venv
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://:redis@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:redis@redis:6379/2
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - venv_data:/app/.venv
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: healthcare_postgres
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d healthcare" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: healthcare_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: healthcare_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: healthcare_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  venv_data:
