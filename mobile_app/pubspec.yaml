name: healthcare_app
description: Health Care Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  dio: ^5.4.3
  get_it: ^7.6.7
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.1.0
  file_picker: ^8.0.3
  equatable: ^2.0.5
  go_router: ^13.2.4
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
